apiVersion: security.kubearmor.com/v1
kind: KubeArmorPolicy
metadata:
  name: wisecow-zero-trust
  namespace: wisecow
spec:
  severity: 8
  tags:
    - zero-trust
    - least-privilege
    - wisecow
  message: "Wisecow zero-trust policy violation: unexpected process, network protocol, or capability use"
  selector:
    matchLabels:
      app: wisecow
  process:
    matchPaths:
      - path: /app/wisecow.sh
      - path: /usr/bin/env
      - path: /bin/bash
      - path: /usr/bin/bash
      - path: /usr/bin/rm
      - path: /usr/bin/mkfifo
      - path: /usr/bin/cat
      - path: /usr/bin/sleep
      - path: /usr/bin/nc
      - path: /bin/nc
      - path: /bin/nc.openbsd
      - path: /usr/games/fortune
      - path: /usr/games/cowsay
  network:
    matchProtocols:
      - protocol: TCP
  capabilities:
    matchCapabilities:
      - capability: net_bind_service
  action: Allow
